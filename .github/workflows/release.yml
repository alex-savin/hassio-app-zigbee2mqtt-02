name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Zigbee2MQTT version (e.g. 2.9.1-1)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version variables
        id: version
        run: |
          echo "addon=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "z2m=$(echo "${{ github.event.inputs.version }}" | cut -d - -f 1)" >> "$GITHUB_OUTPUT"

      - name: Update config.json version
        run: |
          jq '.version = "${{ steps.version.outputs.addon }}"' zigbee2mqtt-02/config.json > tmp.json
          mv tmp.json zigbee2mqtt-02/config.json

      - name: Update CHANGELOG.md
        run: |
          echo -e "## ${{ steps.version.outputs.addon }}\n- Updated Zigbee2MQTT to version [\`${{ steps.version.outputs.z2m }}\`](https://github.com/Koenkk/zigbee2mqtt/releases/tag/${{ steps.version.outputs.z2m }})\n" | \
            cat - zigbee2mqtt-02/CHANGELOG.md > tmp.md
          mv tmp.md zigbee2mqtt-02/CHANGELOG.md

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "v${{ steps.version.outputs.addon }}"

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ steps.version.outputs.addon }}"
          body: "- Updated Zigbee2MQTT to version [`${{ steps.version.outputs.z2m }}`](https://github.com/Koenkk/zigbee2mqtt/releases/tag/${{ steps.version.outputs.z2m }})"
          token: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Get addon version
        id: addon
        run: echo "version=$(jq -r '.version' zigbee2mqtt-02/config.json)" >> "$GITHUB_OUTPUT"

      - name: Prepare build context
        run: |
          cp -R common/rootfs zigbee2mqtt-02/
          cp common/Dockerfile zigbee2mqtt-02/

      - name: Build and push image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: amd64
          context: ./zigbee2mqtt-02
          image: ghcr.io/${{ github.repository_owner }}/zigbee2mqtt-02-amd64
          image-tags: |
            ${{ steps.addon.outputs.version }}
            latest
          version: ${{ steps.addon.outputs.version }}
          push: "true"
          cosign: "false"
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.22
            BUILD_VERSION=${{ steps.addon.outputs.version }}
