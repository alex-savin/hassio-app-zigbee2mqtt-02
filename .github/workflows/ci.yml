name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Get addon version
        id: addon
        run: echo "version=$(jq -r '.version' zigbee2mqtt-02/config.json)" >> "$GITHUB_OUTPUT"

      - name: Prepare build context
        run: |
          cp -R common/rootfs zigbee2mqtt-02/
          cp common/Dockerfile zigbee2mqtt-02/

      - name: Test build image
        uses: home-assistant/builder/actions/build-image@2026.03.2
        with:
          arch: amd64
          context: ./zigbee2mqtt-02
          image: ghcr.io/${{ github.repository_owner }}/zigbee2mqtt-02-amd64
          image-tags: test
          version: ${{ steps.addon.outputs.version }}
          push: "false"
          cosign: "false"
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.22
            BUILD_VERSION=${{ steps.addon.outputs.version }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate config.json
        run: |
          echo "Validating config.json..."
          jq empty zigbee2mqtt-02/config.json
          echo "config.json is valid JSON"

      - name: Validate repository.json
        run: |
          echo "Validating repository.json..."
          jq empty repository.json
          echo "repository.json is valid JSON"

      - name: Check required fields
        run: |
          SLUG=$(jq -r '.slug' zigbee2mqtt-02/config.json)
          VERSION=$(jq -r '.version' zigbee2mqtt-02/config.json)
          IMAGE=$(jq -r '.image' zigbee2mqtt-02/config.json)
          echo "Slug: $SLUG"
          echo "Version: $VERSION"
          echo "Image: $IMAGE"
          [[ "$SLUG" == "zigbee2mqtt-02" ]] || { echo "ERROR: Unexpected slug"; exit 1; }
          [[ -n "$VERSION" && "$VERSION" != "null" ]] || { echo "ERROR: Missing version"; exit 1; }
          [[ -n "$IMAGE" && "$IMAGE" != "null" ]] || { echo "ERROR: Missing image"; exit 1; }
